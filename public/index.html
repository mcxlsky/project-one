<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project One</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #f8f7f5, #ede9e3, #f4f1ee, #fafafa, #ede8e1);
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
      color: #0a0a0a;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 3rem 1.5rem;
    }

    .noise {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
    }

    .container {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    h1 {
      font-family: 'HTF Didot', 'Didot', 'GFS Didot', 'Bodoni MT', 'Playfair Display', serif;
      font-size: clamp(5rem, 14vw, 14rem);
      font-weight: 400;
      line-height: 0.88;
      letter-spacing: -0.02em;
      background: linear-gradient(120deg, #0a0a0a, #3a3a3a, #111, #555, #1a1a1a, #0a0a0a);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp 1.2s ease 0.4s forwards, textGradient 8s ease infinite;
      opacity: 0;
    }

    h1 span {
      display: block;
    }

    h1 .word-one {
      font-style: italic;
    }

    .loop {
      margin-top: 2rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.6rem;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: clamp(0.65rem, 1vw, 0.78rem);
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(10,10,10,0.55);
      opacity: 0;
      animation: fadeUp 1.2s ease 1.1s forwards;
    }

    .loop .arrow {
      color: rgba(10,10,10,0.25);
    }

    .badge {
      display: inline-block;
      margin-bottom: 1.5rem;
      padding: 0.35rem 0.9rem;
      border: 1px solid rgba(10,10,10,0.15);
      border-radius: 999px;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(10,10,10,0.5);
      opacity: 0;
      animation: fadeUp 1.2s ease 0s forwards;
    }

    .links {
      margin-top: 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.15rem;
    }

    .launcher-link {
      display: inline-block;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: #0a0a0a;
      text-decoration: none;
      transition: all 0.2s ease;
      opacity: 0;
      animation: fadeUp 1.2s ease 1.5s forwards;
    }

    .launcher-link:hover {
      opacity: 0.6;
      transform: translateY(-2px);
    }

    .launcher-primary {
      padding: 0.75rem 1.7rem;
      border: 1px solid rgba(10,10,10,0.8);
      border-radius: 999px;
      font-size: 0.9rem;
    }

    .launcher-primary:hover {
      opacity: 1;
      background: #0a0a0a;
      color: #faf9f6;
    }

    .launcher-secondary {
      font-size: 0.8rem;
      color: rgba(10,10,10,0.5);
    }

    @keyframes textGradient {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="container">
    <span class="badge">Coming soon</span>
    <h1>
      <span class="word-project">Project</span>
      <span class="word-one">One</span>
    </h1>

    <div class="loop">
      <span>Event</span>
      <span class="arrow">&rarr;</span>
      <span>Offer</span>
      <span class="arrow">&rarr;</span>
      <span>Connect</span>
      <span class="arrow">&rarr;</span>
      <span>Collab</span>
    </div>

    <div class="links">
      <a href="/collab.html" class="launcher-link launcher-primary">Enter the Collab &rarr;</a>
      <a href="/checker.html" class="launcher-link launcher-secondary">Launch Brand Engine &rarr;</a>
    </div>
  </div>
</body>
</html>
