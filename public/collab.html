<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project One · Connect &amp; Collab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" rel="stylesheet" />
  <style>
    :root {
      --surface-2: #ffffff;
      --surface-1: #f5f4f0;
      --surface-0: #efede7;
      --border: rgba(20, 18, 12, 0.10);
      --border-strong: rgba(20, 18, 12, 0.20);
      --text-primary: #1b1a17;
      --text-secondary: #6c6a63;
      --text-muted: #9c9a92;
      --text-accent: #185fa5;
      --bg-accent: #e6f1fb;
      --text-success: #0f6e56;
      --bg-success: #e1f5ee;
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: var(--surface-0);
      display: grid; place-items: center; padding: 2rem 1rem;
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-primary); -webkit-font-smoothing: antialiased;
    }
    .disp { font-family: 'Playfair Display', Georgia, serif; font-weight: 600; }
    #phone {
      width: 390px; max-width: 100%; height: min(820px, 92vh);
      background: var(--surface-2); border: 0.5px solid var(--border);
      border-radius: 24px; overflow: hidden;
      display: flex; flex-direction: column;
      box-shadow: 0 24px 60px -30px rgba(20, 18, 12, 0.35);
      position: relative;
    }
    .head {
      padding: 15px 17px 13px; border-bottom: 0.5px solid var(--border);
      display: flex; align-items: center; gap: 11px; flex-shrink: 0;
    }
    #screen { flex: 1; overflow-y: auto; padding: 12px 15px 16px; scrollbar-width: none; }
    #screen::-webkit-scrollbar { width: 0; }
    .chips { display: flex; gap: 7px; overflow-x: auto; flex-wrap: nowrap; scrollbar-width: none; margin-bottom: 11px; }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      font-size: 12px; padding: 6px 13px; border-radius: 999px;
      border: 0.5px solid var(--border); background: transparent;
      color: var(--text-secondary); cursor: pointer; white-space: nowrap;
      transition: all .15s; flex-shrink: 0;
    }
    .chip.active { background: var(--text-primary); color: var(--surface-2); border-color: var(--text-primary); font-weight: 600; }
    .card { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 14px; padding: 13px; margin-bottom: 11px; }
    .av {
      position: relative; width: 42px; height: 42px; border-radius: 50%;
      overflow: hidden; background: var(--bg-accent); color: var(--text-accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
    }
    .av img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .add-btn {
      width: 34px; height: 34px; border-radius: 50%;
      border: 1.5px solid var(--text-accent); background: transparent; color: var(--text-accent);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: all .15s;
    }
    .add-btn:hover { background: var(--bg-accent); }
    .add-btn.added { background: var(--text-accent); color: #fff; border-color: var(--text-accent); cursor: default; }
    .btn-mini {
      font-family: 'Manrope', sans-serif; font-size: 12px;
      padding: 7px 13px; border-radius: 10px;
      border: 0.5px solid var(--border-strong); background: transparent;
      color: var(--text-primary); cursor: pointer; font-weight: 500;
    }
    .btn-primary { background: var(--text-accent); color: #fff; border-color: var(--text-accent); }
    .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
    .thumb { position: relative; aspect-ratio: 4/5; border-radius: 9px; overflow: hidden; background: var(--surface-1); }
    .thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .hero { position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden; background: var(--surface-1); }
    .hero img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    input, textarea, select {
      font-family: 'Manrope', sans-serif; font-size: 13px;
      padding: 9px 12px; border: 0.5px solid var(--border-strong); border-radius: 10px;
      background: var(--surface-2); color: var(--text-primary); outline: none;
      width: 100%;
    }
    input { height: 38px; padding: 0 12px; }
    textarea { resize: none; font-family: 'Manrope', sans-serif; }
    input:focus, textarea:focus, select:focus { border-color: var(--text-accent); box-shadow: 0 0 0 3px var(--bg-accent); }
    input::placeholder, textarea::placeholder { color: var(--text-muted); }
    .nav { display: flex; border-top: 0.5px solid var(--border); background: var(--surface-2); flex-shrink: 0; }
    .nav button {
      flex: 1; background: none; border: none; padding: 9px 0 11px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      color: var(--text-muted); font-family: 'Manrope', sans-serif; font-size: 10.5px; cursor: pointer;
    }
    .nav button i { font-size: 21px; }
    .nav button.active { color: var(--text-accent); font-weight: 600; }
    .sheet {
      position: absolute; inset: 0; z-index: 10;
      background: rgba(20, 18, 12, 0.35);
      display: flex; align-items: flex-end;
    }
    .sheet-body {
      background: var(--surface-2); width: 100%;
      border-radius: 20px 20px 0 0; padding: 18px 17px 20px;
      max-height: 82%; overflow-y: auto;
    }
    .sheet-body.centered { border-radius: 20px; margin: auto; max-height: 92%; }
    .sheet.center { align-items: center; padding: 0 12px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 11px; color: var(--text-secondary); margin: 0 0 5px; }
    .banner { padding: 9px 11px; border-radius: 10px; background: var(--bg-accent); color: var(--text-accent); font-size: 12px; margin-bottom: 11px; display: flex; align-items: center; gap: 8px; }
    .banner.success { background: var(--bg-success); color: var(--text-success); }
    .banner.warn { background: #fef3d7; color: #85541b; }
    .caret-btn {
      width: 34px; height: 34px; border-radius: 50%;
      border: 0.5px solid var(--border); background: transparent; color: var(--text-primary);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: all .15s;
    }
    .caret-btn:hover { background: var(--surface-1); }
  </style>
</head>
<body>
  <div id="phone">
    <div class="head">
      <div style="flex:1; min-width:0;">
        <p class="disp" id="location-name" style="margin:0; font-size:22px; font-weight:700; line-height:1.05;">Loading…</p>
        <p id="location-sub" style="margin:3px 0 0; font-size:12px; color:var(--text-secondary);"></p>
      </div>
      <span id="toast" style="font-size:12px; color:var(--text-success); opacity:0; transition:opacity .3s;"></span>
      <button id="collab-btn" aria-label="Your collabs" style="position:relative; border:0.5px solid var(--border); background:transparent; border-radius:10px; width:38px; height:38px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-primary);">
        <i class="ti ti-messages" style="font-size:19px;" aria-hidden="true"></i>
        <span id="collab-badge" style="position:absolute; top:-6px; right:-6px; min-width:17px; height:17px; padding:0 4px; border-radius:999px; background:var(--text-accent); color:#fff; font-size:10px; display:none; align-items:center; justify-content:center; font-weight:600;">0</span>
      </button>
    </div>
    <div id="screen"></div>
    <div class="nav" id="nav">
      <button data-tab="feed" class="active"><i class="ti ti-photo" aria-hidden="true"></i>Feed</button>
      <button data-tab="classifieds"><i class="ti ti-clipboard-text" aria-hidden="true"></i>Classifieds</button>
      <button data-tab="connect"><i class="ti ti-users-plus" aria-hidden="true"></i>Connect</button>
      <button data-tab="profile"><i class="ti ti-user" aria-hidden="true"></i>Profile</button>
    </div>
    <div id="modal" style="display:none"></div>
  </div>

  <script src="collab-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  (function () {
    const cfg = window.PROJECT_ONE;
    const sb = supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);

    const CATS = ['All', 'Design', 'Photography', 'Writing', 'Development'];
    const STEPS = ['Requested', 'Accepted', 'In progress', 'Completed'];
    const U = (id, w, h) => 'https://images.unsplash.com/photo-' + id + '?w=' + w + '&h=' + h + '&fit=crop&q=80';
    const DEFAULT_SHOTS = {
      Design:       ['1561070791-2526d30994b5', '1513364776144-60967b0f800f', '1600880292203-757bb62b4baf'],
      Photography:  ['1507003211169-0a1dd7228f2d', '1470229722913-7c0e2dbbafd3', '1516450360452-9312f5e86fc7'],
      Writing:      ['1517842645767-c639042777db', '1455390582262-044cdead277a', '1544716278-ca5e3f4abd8c'],
      Development:  ['1461749280684-dccba630e2f6', '1498050108023-c5249f4df085', '1555066931-4365d14bab8c']
    };
    const SHOTS_BY_HANDLE = {
      maya:  ['1561070791-2526d30994b5', '1626785774573-4b799315345d', '1600880292203-757bb62b4baf'],
      nina:  ['1513364776144-60967b0f800f', '1460661419201-fd4cecdf8a8b', '1596548438137-d51ea5c83ca5'],
      leo:   ['1470229722913-7c0e2dbbafd3', '1516450360452-9312f5e86fc7', '1501281668745-f7f57925c3b4'],
      theo:  ['1507003211169-0a1dd7228f2d', '1500648767791-00dcc994a43e', '1534528741775-53994a69daeb'],
      priya: ['1517842645767-c639042777db', '1455390582262-044cdead277a', '1544716278-ca5e3f4abd8c'],
      sana:  ['1544716278-ca5e3f4abd8c', '1455390582262-044cdead277a', '1517842645767-c639042777db'],
      devin: ['1461749280684-dccba630e2f6', '1498050108023-c5249f4df085', '1555066931-4365d14bab8c'],
      ivy:   ['1596548438137-d51ea5c83ca5', '1513364776144-60967b0f800f', '1460661419201-fd4cecdf8a8b']
    };
    function shotsFor(p) {
      return SHOTS_BY_HANDLE[p.handle] || DEFAULT_SHOTS[p.category] || DEFAULT_SHOTS.Design;
    }
    function initials(name) {
      return name.split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
    }
    const esc = (s) => { const d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; };

    // ---------- state ----------
    let ev = null;
    let me = null;
    let attendees = [];
    let posts = [];
    let collabsList = [];
    let inbox = [];
    let outbox = [];
    let activeCollab = null;
    let activeMessagesSub = null;
    let view = 'feed';
    let sheetView = null;
    let category = 'All';
    let session = null;        // Supabase Auth session (real auth)
    let myCoords = null;       // {lat,lng} from real browser geolocation
    let geoLabel = null;       // reverse-geocoded neighborhood name

    const $screen = document.getElementById('screen');
    const $toast = document.getElementById('toast');
    const $collabBtn = document.getElementById('collab-btn');
    const $collabBadge = document.getElementById('collab-badge');
    const $locationName = document.getElementById('location-name');
    const $locationSub = document.getElementById('location-sub');
    const $modal = document.getElementById('modal');

    function toast(msg, kind) {
      $toast.textContent = msg;
      $toast.style.color = kind === 'err' ? '#a32d2d' : 'var(--text-success)';
      $toast.style.opacity = '1';
      setTimeout(() => { $toast.style.opacity = '0'; }, 1800);
    }

    // ---------- geolocation ----------
    function locLabel() { return geoLabel || (ev && (ev.neighborhood || ev.name)) || 'Nearby'; }

    function distanceMi(a, b) {
      if (!a || !b || a.lat == null || a.lng == null || b.lat == null || b.lng == null) return null;
      const R = 3958.8, toRad = d => d * Math.PI / 180;
      const dLat = toRad(b.lat - a.lat), dLng = toRad(b.lng - a.lng);
      const s = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1 - s));
    }
    function sortByDistance(list) {
      if (!myCoords) return list;
      return [...list].sort((a, b) => {
        const da = distanceMi(myCoords, a), db = distanceMi(myCoords, b);
        if (da == null && db == null) return 0;
        if (da == null) return 1;
        if (db == null) return -1;
        return da - db;
      });
    }
    function distanceLabel(p) {
      const d = distanceMi(myCoords, p);
      if (d == null) return '';
      const txt = d < 0.1 ? 'here' : ((d < 10 ? d.toFixed(1) : Math.round(d)) + ' mi');
      return ' · <i class="ti ti-map-pin" style="font-size:11px;vertical-align:-1px" aria-hidden="true"></i> ' + txt;
    }
    async function detectLocation() {
      if (!navigator.geolocation) return;
      await new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(async (pos) => {
          myCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          try {
            const r = await fetch('https://api.bigdatacloud.net/data/reverse-geocode-client?latitude='
              + myCoords.lat + '&longitude=' + myCoords.lng + '&localityLanguage=en');
            const j = await r.json();
            geoLabel = j.locality || j.city || j.principalSubdivision || null;
          } catch (_) {}
          if (geoLabel) $locationName.textContent = geoLabel;
          if (me && me.id) {
            try {
              await sb.from('profiles').update({ lat: myCoords.lat, lng: myCoords.lng }).eq('id', me.id);
              me.lat = myCoords.lat; me.lng = myCoords.lng;
            } catch (_) {}
          }
          if (view === 'connect') render();
          resolve();
        }, () => resolve(), { timeout: 6000, maximumAge: 300000 });
      });
    }

    // ---------- data ----------
    async function loadEvent() {
      const { data, error } = await sb.from('events').select('*').eq('slug', cfg.EVENT_SLUG).single();
      if (error) throw error;
      ev = data;
      $locationName.textContent = locLabel();
      $locationSub.textContent = '';
    }

    async function loadMe() {
      if (!session) { me = null; return; }
      const { data } = await sb.from('profiles').select('*').eq('user_id', session.user.id).maybeSingle();
      me = data || null;
    }

    async function loadAttendees() {
      const { data } = await sb.from('profiles').select('*').eq('event_id', ev.id).order('name');
      attendees = (data || []).filter(a => !me || a.id !== me.id);
      updateLocationSub();
    }

    function updateLocationSub() {
      const total = attendees.length + (me ? 1 : 0);
      $locationSub.textContent = total + ' ' + (total === 1 ? 'person' : 'people') + ' nearby';
    }

    async function loadPosts() {
      const { data } = await sb.from('posts')
        .select('*, a:a_profile(id,name,handle,avatar_url), b:b_profile(id,name,handle,avatar_url)')
        .eq('event_id', ev.id).order('created_at', { ascending: false });
      posts = data || [];
    }

    async function loadCollabs() {
      if (!me) { collabsList = []; return; }
      const { data } = await sb.from('collabs')
        .select('*, a:a_profile(id,name,handle,avatar_url,category,service), b:b_profile(id,name,handle,avatar_url,category,service)')
        .eq('event_id', ev.id)
        .or('a_profile.eq.' + me.id + ',b_profile.eq.' + me.id)
        .order('updated_at', { ascending: false });
      collabsList = data || [];
    }

    async function loadConnections() {
      if (!me) { inbox = []; outbox = []; return; }
      const { data: inD } = await sb.from('connections')
        .select('*, from:from_profile(id,name,handle,avatar_url,category,service)')
        .eq('to_profile', me.id).eq('status', 'pending').order('created_at', { ascending: false });
      inbox = inD || [];
      const { data: outD } = await sb.from('connections')
        .select('to_profile,status')
        .eq('from_profile', me.id).eq('status', 'pending');
      outbox = outD || [];
    }

    async function reloadAll() {
      await Promise.all([loadAttendees(), loadPosts(), loadCollabs(), loadConnections()]);
    }

    // ---------- actions ----------
    async function createProfile(form) {
      // random suffix keeps handles unique per event without blocking sign-up
      const handle = form.name.trim().toLowerCase().replace(/[^a-z0-9]/g, '').slice(0, 20)
        + Math.random().toString(36).slice(2, 6);
      const payload = {
        event_id: ev.id,
        user_id: session ? session.user.id : null,
        handle: handle,
        name: form.name.trim(),
        category: form.category,
        service: form.service.trim(),
        blurb: form.blurb.trim() || null,
        wants: form.wants.trim() || null,
        avatar_url: form.avatar_url || null,
        lat: myCoords ? myCoords.lat : null,
        lng: myCoords ? myCoords.lng : null
      };
      const { data, error } = await sb.from('profiles').insert(payload).select().single();
      if (error) throw error;
      me = data;
    }

    async function updateClassified(wants) {
      if (!me) return;
      const { error } = await sb.from('profiles').update({ wants: wants || null }).eq('id', me.id);
      if (error) { toast(error.message.slice(0, 40), 'err'); return; }
      me.wants = wants || null;
      toast('Classified updated');
    }

    async function sendConnect(toId, proposal) {
      const { error } = await sb.from('connections').insert({
        event_id: ev.id, from_profile: me.id, to_profile: toId,
        proposal: proposal || null, status: 'pending'
      });
      if (error) { toast(error.message.slice(0, 40), 'err'); return; }
      toast('Request sent');
      await loadConnections();
    }

    async function acceptConnect(reqId, fromId, service) {
      await sb.from('connections').update({ status: 'accepted' }).eq('id', reqId);
      const { data: collab } = await sb.from('collabs').insert({
        event_id: ev.id, a_profile: fromId, b_profile: me.id, service: service || null, step: 2
      }).select().single();
      toast('Accepted — collab open');
      await Promise.all([loadConnections(), loadCollabs()]);
      if (collab) { activeCollab = collab.id; view = 'collabDetail'; }
      render();
    }

    async function declineConnect(reqId) {
      await sb.from('connections').update({ status: 'declined' }).eq('id', reqId);
      await loadConnections(); render();
    }

    async function sendMessage(collabId, body) {
      await sb.from('messages').insert({ collab_id: collabId, sender_profile: me.id, body });
    }

    async function advanceStep(collab) {
      const next = Math.min(4, collab.step + 1);
      await sb.from('collabs').update({ step: next, updated_at: new Date().toISOString() }).eq('id', collab.id);
    }

    async function markDone(collab) {
      const field = collab.a.id === me.id ? 'a_done' : 'b_done';
      const patch = { [field]: true, updated_at: new Date().toISOString() };
      const otherDone = collab.a.id === me.id ? collab.b_done : collab.a_done;
      if (otherDone) {
        patch.step = 4;
        await sb.from('collabs').update(patch).eq('id', collab.id);
        const heroShot = shotsFor(me)[0];
        await sb.from('posts').insert({
          event_id: ev.id, collab_id: collab.id,
          a_profile: collab.a.id, b_profile: collab.b.id,
          title: (collab.service || 'Collab') + ' — completed',
          image_url: U(heroShot, 600, 600),
          tag: collab.a.category + ' × ' + collab.b.category,
          likes: 0
        });
        toast('Collab complete — posted to Feed');
      } else {
        await sb.from('collabs').update(patch).eq('id', collab.id);
        toast('Marked done — waiting on other side');
      }
    }

    // ---------- rendering ----------
    function avatar(p, size) {
      const s = size || 42;
      const url = p.avatar_url;
      const init = initials(p.name || '?');
      const inner = url
        ? '<span>' + init + '</span><img src="' + esc(url) + '" alt="" onerror="this.remove()">'
        : '<span>' + init + '</span>';
      return '<div class="av" style="width:' + s + 'px;height:' + s + 'px;font-size:' + Math.round(s / 3.2) + 'px">' + inner + '</div>';
    }
    function tile(id) { return '<div class="thumb"><img src="' + U(id, 240, 300) + '" alt="" loading="lazy"></div>'; }
    function workGrid(p, n) {
      const s = shotsFor(p);
      let out = '<div class="grid3" style="margin-top:11px">';
      for (let i = 0; i < n; i++) out += tile(s[i % s.length]);
      return out + '</div>';
    }

    function updateBadge() {
      const n = collabsList.length + inbox.length;
      $collabBadge.textContent = n;
      $collabBadge.style.display = n ? 'flex' : 'none';
      const on = view === 'collabs' || view === 'collabDetail';
      $collabBtn.style.background = on ? 'var(--bg-accent)' : 'transparent';
      $collabBtn.style.color = on ? 'var(--text-accent)' : 'var(--text-primary)';
      document.querySelectorAll('.nav button').forEach(b => b.classList.toggle('active', b.dataset.tab === view));
    }

    function chipsBar() {
      return '<div class="chips">' + CATS.map(c => {
        const n = c === 'All' ? attendees.length : attendees.filter(a => a.category === c).length;
        return '<button class="chip ' + (c === category ? 'active' : '') + '" data-cat="' + c + '">' + c + ' <span style="opacity:.6">' + n + '</span></button>';
      }).join('') + '</div>';
    }

    function feedView() {
      if (!posts.length) {
        $screen.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-secondary)"><i class="ti ti-photo-off" style="font-size:36px" aria-hidden="true"></i><p style="font-size:13px;margin:14px 0 0">No collab work yet. Complete a collab and it lands here.</p></div>';
        return;
      }
      $screen.innerHTML = posts.map(p => {
        const A = p.a, B = p.b;
        if (!A || !B) return '';
        return '<div class="card" style="padding:0;overflow:hidden">'

    function tracker(step) {
      let cells = '';
      for (let i = 1; i <= 4; i++) {
        const on = i <= step;
        const fill = on ? 'var(--text-accent)' : 'var(--border)';
        const txt = on ? 'var(--text-primary)' : 'var(--text-muted)';
        const icon = i < step ? '<i class="ti ti-check" style="font-size:13px;color:#fff" aria-hidden="true"></i>' : '<span style="font-size:11px;color:' + (on ? '#fff' : 'var(--text-muted)') + '">' + i + '</span>';
        cells += '<div style="display:flex;flex-direction:column;align-items:center;gap:5px;width:54px">'
          + '<div style="width:22px;height:22px;border-radius:50%;background:' + fill + ';display:flex;align-items:center;justify-content:center">' + icon + '</div>'
          + '<span style="font-size:10.5px;color:' + txt + ';text-align:center;line-height:1.2">' + STEPS[i - 1] + '</span></div>';
        if (i < 4) cells += '<div style="flex:1;height:2px;background:' + (i < step ? 'var(--text-accent)' : 'var(--border)') + ';margin:0 2px 16px"></div>';
      }
      return '<div style="display:flex;align-items:flex-start;justify-content:space-between;padding:4px 2px 12px">' + cells + '</div>';
    }

    async function detailView() {
      const c = collabsList.find(x => x.id === activeCollab);
      if (!c) { view = 'collabs'; render(); return; }
      const other = c.a.id === me.id ? c.b : c.a;
      const { data: msgs } = await sb.from('messages').select('*').eq('collab_id', c.id).order('created_at');
      const bubbles = (msgs || []).map(m => {
        const mine = m.sender_profile === me.id;
        return '<div style="display:flex;justify-content:' + (mine ? 'flex-end' : 'flex-start') + ';margin-bottom:6px">'
          + '<div style="max-width:78%;font-size:13px;line-height:1.45;padding:8px 11px;border-radius:13px;'
          + (mine ? 'background:var(--text-accent);color:#fff' : 'background:var(--surface-1);color:var(--text-primary);border:0.5px solid var(--border)') + '">' + esc(m.body) + '</div></div>';
      }).join('');
      const myDone = c.a.id === me.id ? c.a_done : c.b_done;
      const otherDone = c.a.id === me.id ? c.b_done : c.a_done;
      let action;
      if (c.step < 3) {
        action = '<button class="btn-mini btn-primary" id="advance" style="width:100%;padding:10px">Advance to ' + STEPS[c.step] + '</button>';
      } else if (c.step === 3) {
        if (myDone && otherDone) action = '<div style="text-align:center;font-size:12px;color:var(--text-success);padding:9px"><i class="ti ti-confetti" style="font-size:14px;vertical-align:-2px" aria-hidden="true"></i> Collab complete — posted to Feed</div>';
        else if (myDone) action = '<div style="text-align:center;font-size:12px;color:var(--text-secondary);padding:9px">Marked done. Waiting on ' + esc(other.name.split(' ')[0]) + '.</div>';
        else action = '<button class="btn-mini btn-primary" id="markdone" style="width:100%;padding:10px">Mark my side done' + (otherDone ? ' → publish' : '') + '</button>';
      } else {
        action = '<div style="text-align:center;font-size:12px;color:var(--text-success);padding:9px"><i class="ti ti-confetti" style="font-size:14px;vertical-align:-2px" aria-hidden="true"></i> Collab complete — posted to Feed</div>';
      }
      $screen.innerHTML =
        '<button id="back" class="btn-mini" style="border:none;padding:2px 0 10px;color:var(--text-secondary)"><i class="ti ti-chevron-left" style="font-size:15px;vertical-align:-2px" aria-hidden="true"></i> Collabs</button>'
        + '<div style="display:flex;gap:11px;align-items:center;margin-bottom:11px">' + avatar(other)
        + '<div><p class="disp" style="margin:0;font-size:19px">' + esc(other.name) + '</p><p style="margin:0;font-size:12px;color:var(--text-secondary)">' + esc(c.service || 'Collab') + '</p></div></div>'
        + '<div class="card" style="padding:11px 8px">' + tracker(c.step) + '</div>'
        + '<div style="margin:4px 0 11px">' + action + '</div>'
        + '<p style="font-size:12px;color:var(--text-secondary);margin:0 0 8px">Messages</p>'
        + '<div id="bubbles" style="background:var(--surface-1);border-radius:13px;padding:10px;margin-bottom:8px;min-height:60px">' + bubbles + '</div>'
        + '<div style="display:flex;gap:6px"><input id="msg" placeholder="Message ' + esc(other.name.split(' ')[0]) + '" style="flex:1" /><button id="send" class="btn-mini btn-primary"><i class="ti ti-send" style="font-size:15px" aria-hidden="true"></i></button></div>';
      document.getElementById('back').addEventListener('click', () => { closeMessagesSub(); view = 'collabs'; activeCollab = null; render(); });
      const adv = document.getElementById('advance');
      if (adv) adv.addEventListener('click', async () => { await advanceStep(c); await loadCollabs(); render(); });
      const md = document.getElementById('markdone');
      if (md) md.addEventListener('click', async () => { await markDone(c); await Promise.all([loadCollabs(), loadPosts()]); render(); });
      const input = document.getElementById('msg');
      const send = document.getElementById('send');
      const doSend = async () => { const v = input.value.trim(); if (!v) return; input.value = ''; await sendMessage(c.id, v); };
      send.addEventListener('click', doSend);
      input.addEventListener('keydown', e => { if (e.key === 'Enter') doSend(); });
      openMessagesSub(c.id);
    }

    function openMessagesSub(collabId) {
      closeMessagesSub();
      activeMessagesSub = sb.channel('messages-' + collabId)
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: 'collab_id=eq.' + collabId }, payload => {
          const m = payload.new;
          const mine = m.sender_profile === me.id;
          const bub = document.getElementById('bubbles');
          if (!bub) return;
          bub.insertAdjacentHTML('beforeend',
            '<div style="display:flex;justify-content:' + (mine ? 'flex-end' : 'flex-start') + ';margin-bottom:6px">'
            + '<div style="max-width:78%;font-size:13px;line-height:1.45;padding:8px 11px;border-radius:13px;'
            + (mine ? 'background:var(--text-accent);color:#fff' : 'background:var(--surface-1);color:var(--text-primary);border:0.5px solid var(--border)') + '">' + esc(m.body) + '</div></div>');
          bub.scrollTop = bub.scrollHeight;
        }).subscribe();
    }
    function closeMessagesSub() { if (activeMessagesSub) { sb.removeChannel(activeMessagesSub); activeMessagesSub = null; } }

    // ---------- sheets (onboarding + propose) ----------
    function openSheet(html, opts) {
      opts = opts || {};
      $modal.style.display = 'block';

    function openAuthSheet(step, email) {
      step = step || 'email';
      if (step === 'email') {
        openSheet(
          '<p class="disp" style="margin:0 0 4px;font-size:20px;font-weight:700">Sign in to Project One</p>'
          + '<p style="margin:0 0 14px;font-size:12.5px;color:var(--text-secondary)">We\'ll email you a 6-digit code — no password to remember.</p>'
          + '<div class="field"><label>Email</label><input id="a-email" type="email" placeholder="you@email.com" value="' + esc(email || '') + '"></div>'
          + '<button id="a-send" class="btn-mini btn-primary" style="width:100%;padding:11px;margin-top:6px">Email me a code</button>',
          { center: true, dismissable: false }
        );
        document.getElementById('a-send').addEventListener('click', async () => {
          const em = document.getElementById('a-email').value.trim();
          if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(em)) { toast('Enter a valid email', 'err'); return; }
          const btn = document.getElementById('a-send'); btn.disabled = true; btn.textContent = 'Sending…';
          const { error } = await sb.auth.signInWithOtp({ email: em, options: { shouldCreateUser: true } });
          if (error) { toast(error.message.slice(0, 40), 'err'); btn.disabled = false; btn.textContent = 'Email me a code'; return; }
          openAuthSheet('code', em);
        });
      } else {
        openSheet(
          '<p class="disp" style="margin:0 0 4px;font-size:20px;font-weight:700">Enter your code</p>'
          + '<p style="margin:0 0 14px;font-size:12.5px;color:var(--text-secondary)">Sent to ' + esc(email) + '.</p>'
          + '<div class="field"><label>6-digit code</label><input id="a-code" inputmode="numeric" placeholder="123456"></div>'
          + '<button id="a-verify" class="btn-mini btn-primary" style="width:100%;padding:11px;margin-top:6px">Verify &amp; continue</button>'
          + '<button id="a-back" class="btn-mini" style="width:100%;padding:9px;margin-top:8px;border:none;color:var(--text-secondary)">Use a different email</button>',
          { center: true, dismissable: false }
        );
        document.getElementById('a-back').addEventListener('click', () => openAuthSheet('email', email));
        document.getElementById('a-verify').addEventListener('click', async () => {
          const token = document.getElementById('a-code').value.trim();
          if (token.length < 6) { toast('Enter the 6-digit code', 'err'); return; }
          const btn = document.getElementById('a-verify'); btn.disabled = true; btn.textContent = 'Verifying…';
          const { data, error } = await sb.auth.verifyOtp({ email, token, type: 'email' });
          if (error) { toast(error.message.slice(0, 40), 'err'); btn.disabled = false; btn.textContent = 'Verify & continue'; return; }
          session = data.session;
          closeSheet();
          await loadMe();
          await reloadAll();
          render();
        });
      }
    }

      openSheet(

        + '<p style="margin:0 0 14px;font-size:12.5px;color:var(--text-secondary)">Trade for portfolio — bring what you offer, find people nearby to build with.</p>'

          + CATS.filter(c => c !== 'All').map(c => '<option>' + c + '</option>').join('')

        + '<div class="field"><label>What you offer (one line)</label><input id="f-service" placeholder="e.g. Portrait photography"></div>'
        + '<div class="field"><label>Short bio</label><textarea id="f-blurb" rows="2" placeholder="One-line pitch, optional"></textarea></div>'
        + '<button id="f-submit" class="btn-mini btn-primary" style="width:100%;padding:11px;margin-top:6px">Get started</button>',
        { center: true, dismissable: false }
      );
      document.getElementById('f-submit').addEventListener('click', async () => {
        const form = {
          name: document.getElementById('f-name').value,
          category: document.getElementById('f-category').value,
          service: document.getElementById('f-service').value,
          blurb: document.getElementById('f-blurb').value,
          wants: ''
        };
        if (!form.name.trim() || !form.service.trim()) { toast('Name and service are required', 'err'); return; }
        try {
          await createProfile(form);
          closeSheet();
          await reloadAll();
          view = 'feed';
          render();
        } catch (e) {
          toast((e.message || 'Error').slice(0, 40), 'err');
        }
      });
    }

    function openProposeSheet(toId, title) {
      const target = attendees.find(a => a.id === toId);
      if (!target) return;
      openSheet(
        '<p class="disp" style="margin:0 0 4px;font-size:18px;font-weight:700">' + esc(title) + '</p>'
        + '<div style="display:flex;gap:10px;align-items:center;margin:6px 0 12px">' + avatar(target, 36)
        + '<div><p class="disp" style="margin:0;font-size:14px">' + esc(target.name) + '</p>'
        + '<p style="margin:0;font-size:11.5px;color:var(--text-secondary)">' + esc(target.category) + ' · ' + esc(target.service) + '</p></div></div>'
        + (target.wants ? '<div style="background:var(--surface-1);border-radius:10px;padding:9px 11px;font-size:12.5px;line-height:1.5;margin-bottom:12px"><span style="color:var(--text-secondary);font-size:11px;display:block">Their want</span>' + esc(target.wants) + '</div>' : '')
        + '<div class="field"><label>The trade you propose</label><textarea id="prop" rows="4" placeholder="What you\'ll make for them + what you want back."></textarea></div>'
        + '<div style="display:flex;gap:6px"><button class="btn-mini" id="prop-cancel" style="flex:1">Cancel</button><button class="btn-mini btn-primary" id="prop-send" style="flex:2">Send request</button></div>'
      );
      document.getElementById('prop-cancel').addEventListener('click', closeSheet);
      document.getElementById('prop-send').addEventListener('click', async () => {
        const proposal = document.getElementById('prop').value.trim();
        if (proposal.length < 4) { toast('Add a short proposal', 'err'); return; }
        closeSheet();
        await sendConnect(toId, proposal);
        render();
      });
    }

    // ---------- master render ----------
    function render() {
      updateBadge();
      if (!session) { openAuthSheet(); return; }
      if (!me) { openOnboardingSheet(); return; }
      if (view === 'feed') return feedView();
      if (view === 'classifieds') return classifiedsView();
      if (view === 'connect') return connectView();
      if (view === 'profile') return profileView();
      if (view === 'collabs') return collabsView();
      if (view === 'collabDetail') return detailView();
    }

    // ---------- global subscriptions ----------
    function openGlobalSubs() {
      sb.channel('conn-' + (me ? me.id : 'anon'))
        .on('postgres_changes', { event: '*', schema: 'public', table: 'connections' }, async () => {
          await loadConnections(); if (view === 'collabs') render(); else updateBadge();
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'collabs' }, async () => {
          await loadCollabs(); if (view === 'collabs' || view === 'collabDetail') render(); else updateBadge();
        })
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'posts' }, async () => {
          await loadPosts(); if (view === 'feed') render();
        })
        .subscribe();
    }

    // ---------- boot ----------
    document.querySelectorAll('.nav button').forEach(b => b.addEventListener('click', () => {
      closeMessagesSub();
      view = b.dataset.tab; activeCollab = null; $screen.scrollTop = 0; render();
    }));
    $collabBtn.addEventListener('click', () => { closeMessagesSub(); view = 'collabs'; activeCollab = null; $screen.scrollTop = 0; render(); });

    sb.auth.onAuthStateChange((_event, s) => { session = s; });

    (async () => {
      try {
        const { data: { session: s } } = await sb.auth.getSession();
        session = s;
        await loadEvent();
        await loadMe();
        await reloadAll();
        openGlobalSubs();
        render();
        detectLocation();  // async, non-blocking — updates header + coords when granted
      } catch (e) {
        $screen.innerHTML = '<div style="padding:20px;color:#a32d2d;font-size:13px">Could not load: ' + esc(e.message || String(e)) + '</div>';
      }
    })();
  })();
  </script>
</body>
</html>
